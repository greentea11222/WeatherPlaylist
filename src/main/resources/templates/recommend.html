<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>お天気プレイリスト</title>
	<style>
		body { font-family: Arial, sans-serif; background: #f0f4f8; text-align: center; padding: 50px; }
		.playlist-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
		.music-item { margin: 15px 0; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
		.play-btn { background: #ff0000; color: white; padding: 5px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 14px; }
		.play-btn:hover { background: #cc0000;}
	</style>
</head>
<body>
	<div class="playlist-card" th:each="playlist: ${playlists}">
		<h2 th:text="${playlist.title}"プレイリスト名></h2>
		<p>現在の気分：<span th:text="${playlist.status}" style="font-weight: bold; color: #3182ce">STATUS</span></p>
		<hr>
		
		<div>
			<div class="music-item" th:each="music : ${plaulist.musicList}">
				<div style="text-align: left;">
					<string th:text="${music.title}">曲名</string><br>
					<small th:text="${music.artist}" style="color: #666">アーティスト</small>
				</div>
				<a th:href="${music.youtubeUrl}" target="_blank" class="play-btn">再生</a>
			</div>
		</div>
	</div>
</body>
</html>
